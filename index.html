<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levend Water & Klabakken (Beamer Safe)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --water: #00a8ff; --deep: #273c75; --teamA: #0984e3; --teamB: #e84393; --bg: #f5f6fa; --danger: #d63031; --dirty: #7f8c8d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #2f3640; }
        
        .section-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 850px; margin: 20px auto; border-top: 8px solid var(--water); position: relative; }
        h1, h2, h3 { text-align: center; color: var(--deep); }

        .admin-link { position: absolute; top: 15px; right: 20px; font-size: 0.8rem; color: #b2bec3; cursor: pointer; text-decoration: none; border: 1px solid #dfe6e9; padding: 2px 8px; border-radius: 5px; }

        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 15px; overflow: hidden; background: #000; margin: 20px 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .source-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .btn-source { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; font-size: 0.9rem; }
        .btn-dirty { background: var(--dirty); }
        .btn-clean { background: var(--water); }
        
        #display-source { background: #fffde7; padding: 20px; border-radius: 15px; text-align: center; font-size: 1.1rem; font-weight: bold; margin-top: 15px; border: 2px solid #f1c40f; color: var(--deep); display: none; }

        .timer { font-size: 4rem; font-weight: 900; color: var(--danger); text-align: center; margin: 10px 0; }
        .word-box { font-size: 2rem; background: #fff3cd; padding: 20px; border: 3px dashed #fdcb6e; border-radius: 15px; text-align: center; font-weight: bold; margin: 15px 0; }
        
        .game-btn { background: var(--deep); color: white; border: none; padding: 12px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; margin: 5px 0; display: block; }
        .btn-wrong { background: #fab1a0; color: #d63031; }

        .hidden { display: none; }
        .score-row { display: flex; justify-content: space-around; background: #f8f9fa; padding: 15px; border-radius: 15px; margin: 15px 0; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        
        /* Admin Privacy Modus */
        .admin-panel { background: #f1f2f6; border: 2px solid var(--water); padding: 15px; border-radius: 15px; margin-top: 20px; }
        .privacy-toggle { background: #ffeaa7; padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center; font-weight: bold; cursor: pointer; border: 2px solid #fdcb6e; }
        .beamer-blur { filter: blur(8px); opacity: 0.2; pointer-events: none; }
        .word-peek { font-size: 0.7rem; color: var(--water); text-decoration: underline; cursor: pointer; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="section-card">
        <div class="admin-link" onclick="toggleAdminLogin()">⚙️ Beheer</div>
        <h1>🌊 Levend Water</h1>
        
        <div id="admin-login-box" class="hidden admin-panel">
            <h3>Beheerders Login</h3>
            <input type="password" id="admin-pass" placeholder="Wachtwoord...">
            <button class="game-btn" onclick="login(true)">Inloggen</button>
        </div>

        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/sFIe0AQWZ9U?start=0&end=400&rel=0" frameborder="0" allowfullscreen></iframe>
        </div>
        
        <div class="source-grid">
            <button class="btn-source btn-dirty" onclick="setSource('Vuile bron: \'Als ik succesvol ben, word ik gewaardeerd.\' [00:06:16]')">Prestaties</button>
            <button class="btn-source btn-dirty" onclick="setSource('Vuile bron: \'Als ik er goed uitzie, word ik bewonderd.\' [00:06:08]')">Uiterlijk</button>
            <button class="btn-source btn-dirty" onclick="setSource('Vuile bron: Sociale status en erkenning van anderen.')">Sociale Status</button>
            <button class="btn-source btn-clean" onclick="setSource('Levend Water: \'Je bent mijn geliefde kind, in jou vind ik vreugde.\' [00:26:14]')">Geliefd Kind</button>
            <button class="btn-source btn-clean" onclick="setSource('Levend Water: \'Hij herstelt je ziel in de oorspronkelijke staat.\' [00:24:40]')">Zielherstel</button>
        </div>
        <div id="display-source"></div>
    </div>

    <div id="setup-screen" class="section-card">
        <h2>🎮 Klabakken</h2>
        <input type="text" id="username" placeholder="Typ je naam...">
        <button class="game-btn" onclick="login(false)">Deelnemen</button>
    </div>

    <div id="word-screen" class="section-card hidden">
        <h2>Hoi <span id="display-name"></span></h2>
        <input type="text" id="user-word" placeholder="Voeg een woord toe...">
        <button class="game-btn" onclick="submitWord()">In de pot!</button>
    </div>

    <div id="game-screen" class="section-card hidden">
        <div id="timer" class="timer">30</div>
        
        <div id="player-view">
            <div id="player-active" class="hidden">
                <p style="text-align:center;">JOUW WOORD:</p>
                <div id="secret-word" class="word-box">...</div>
            </div>
            <div id="spectator-view" style="text-align:center;">
                <p>Raad het woord van:</p>
                <h3 id="active-player-name" style="color:var(--water); font-size:2rem;">?</h3>
            </div>
        </div>

        <div class="score-row">
            <div>A: <span id="score-a">0</span></div>
            <div>B: <span id="score-b">0</span></div>
        </div>

        <div id="admin-controls" class="hidden admin-panel">
            <div class="privacy-toggle" onclick="toggleBeamerMode()" id="beamerStatus">
                🛡️ BEAMER MODUS: UIT (Iedereen ziet alles)
            </div>

            <div id="admin-info-container">
                <div id="admin-word-display" style="text-align:center; padding:10px; background:white; border-radius:10px; border:1px solid #ddd;">
                    <span id="blurred-info">Gegevens verborgen...</span>
                </div>
                <span class="word-peek" onmousedown="peek(true)" onmouseup="peek(false)" ontouchstart="peek(true)" ontouchend="peek(false)">Houd ingedrukt om woord te spieken 👁️</span>
            </div>

            <button class="game-btn" style="background:#00b894; margin-top:15px;" id="startBtn" onclick="toggleClock()">START KLOK ▶️</button>
            <div id="judge-controls" class="hidden">
                <button class="game-btn" style="background:var(--water)" onclick="judge(true)">PUNT ✅</button>
                <button class="game-btn btn-wrong" onclick="judge(false)">STOP / FOUT ❌</button>
            </div>
            <button class="game-btn" style="background:#b2bec3; font-size:0.7rem; width:auto; margin: 20px auto 0;" onclick="resetGame()">RESET ALLES</button>
        </div>
    </div>

    <script type="module">

        import { getDatabase, ref, set, onValue, update, push, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

            databaseURL: "https://huddlebijdebie26jan-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "huddlebijdebie26jan",
            storageBucket: "huddlebijdebie26jan.firebasestorage.app",
            messagingSenderId: "700291377085",
            appId: "1:700291377085:web:d07c390ccdb760d77094d4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myName = "", isAdmin = false, beamerMode = false, currentWord = "";

        window.toggleAdminLogin = () => document.getElementById('admin-login-box').classList.toggle('hidden');
        
        window.toggleBeamerMode = () => {
            beamerMode = !beamerMode;
            const btn = document.getElementById('beamerStatus');
            btn.innerText = beamerMode ? "🛡️ BEAMER MODUS: AAN (Woorden verborgen)" : "🛡️ BEAMER MODUS: UIT (Iedereen ziet alles)";
            btn.style.background = beamerMode ? "#55efc4" : "#ffeaa7";

        };

        window.peek = (show) => {
            if(!beamerMode) return;
            document.getElementById('admin-word-display').classList.toggle('beamer-blur', !show);
        };

        window.setSource = (t) => { document.getElementById('display-source').innerText = t; document.getElementById('display-source').style.display = 'block'; };
